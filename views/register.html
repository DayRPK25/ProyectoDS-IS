<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--link rel="stylesheet" href="css/style.css"-->
    <title>Registro de cuenta</title>
</head>
<body>

    <h1>Registro de cuenta</h1>
    
    <label for="correo">Correo:</label>
    <input type="text" id="inputCorreo" name="correo">
    <br>

    <label for="nombre">Nombre:</label>
    <input type="text" id="inputNombre" name="nombre">
    <br>

    <label for="nombreUsuario">Nombre de usuario:</label>
    <input type="text" id="inputNombreUsuario" name="nombreUsuario">
    <br>

    <label for="Contraseña">Contraseña:</label>
    <input type="password" id="inputContrasena" name="contrasena">
    <br>

    <label for="rol">Rol:</label>
    <br>
    <input type="radio" id="radioButtonEstudiante" name="rol" value="ESTUDIANTE" checked>
    <label for="estudiante">Estudiante</label>
    <br>

    <input type="radio" id="radioButtonProfesor" name="rol" value="PROFESOR">
    <label for="profesor">Profesor</label>
    <br>

    <button type="button" id="buttonRegistrarse">Registrarse</button>
    
    <script src="js/config.js"></script>
    <script>
        const BASE = window.API_BASE;
        const buttonRegistrarse = document.getElementById('buttonRegistrarse');

        buttonRegistrarse.addEventListener('click', async () => {
            const correo = document.getElementById('inputCorreo').value.trim();
            const nombre = document.getElementById('inputNombre').value.trim();
            const nombreUsuario = document.getElementById('inputNombreUsuario').value.trim();
            const contrasena = document.getElementById('inputContrasena').value.trim();
            const rol = document.querySelector('input[name="rol"]:checked').value;

            console.log("Datos a enviar:", { correo, nombre, nombreUsuario, rol });

            try {
                const response = await fetch(BASE + '/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo, nombre, nombreUsuario, contrasena, rol })
                });

                const data = await response.json();

                if (!response.ok) {
                    console.error('Error:', data.error);
                    alert('Hubo un error:' + data.error);
                    return;
                }

                // tras registrar, volvemos al login con el aviso de cuenta creada
                window.location.href = BASE + '/login?cuentaCreada=1';

            } catch (error) {
                console.error('Error al registrarse:', error);
                alert('Error al registrarse:' + error);
            }
        });
    </script>
</body>
</html>
