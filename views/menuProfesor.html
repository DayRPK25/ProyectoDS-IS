<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu del profesor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: #4B3B8C;
            display: flex;
            font-family: sans-serif;
        }

        /* sidebar */
        .sidebar {
            width: 200px;
            min-height: 100vh;
            background-color: #EADDFF;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 1px solid #BFB7CC;
            margin-bottom: 4px;
        }

        .icono-usuario {
            width: 48px;
            height: 48px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* icono de silueta simple con SVG inline */
        .icono-usuario svg {
            width: 28px;
            height: 28px;
            fill: #6750A4;
        }

        .sidebar-perfil span {
            font-size: 0.85rem;
            color: #1C1B1F;
        }

        .nav-btn {
            background-color: #6B5B95;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .nav-btn:hover {
            background-color: #4F378A;
        }

        .nav-btn.activo {
            background-color: #4F378A;
        }

        /* empuja el boton de cerrar sesion al fondo */
        .sidebar-espaciador {
            flex: 1;
        }

        .btn-cerrar-sesion {
            background-color: #FF383C;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            width: 100%;
        }

        .btn-cerrar-sesion:hover {
            background-color: #cc1f22;
        }

        /* area principal */
        .contenido {
            flex: 1;
            padding: 32px 28px;
        }

        .contenido h2 {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* lista de tareas */
        .lista-tareas {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tarjeta-tarea {
            background-color: #C9C9C9;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tarjeta-tarea span {
            font-size: 0.9rem;
            color: #1C1B1F;
        }

        .btn-ver {
            background-color: #316AFB;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 7px 20px;
            font-size: 0.82rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-ver:hover {
            background-color: #1a53e0;
        }

        /* estado vacio */
        .sin-tareas {
            color: #BFB7CC;
            font-size: 0.88rem;
            margin-top: 8px;
        }

        /* spinner de carga */
        .cargando {
            color: #BFB7CC;
            font-size: 0.88rem;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-perfil">
            <div class="icono-usuario">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <span id="nombreUsuario">Usuario</span>
        </div>

        <button class="nav-btn activo" id="btnCursos" onclick="mostrarSeccion('cursos')">Cursos</button>
        <button class="nav-btn" id="btnCrearTarea" onclick="mostrarSeccion('crearTarea')">Crear tarea</button>
        <button class="nav-btn" onclick="window.location.href='http://170.9.26.131:80/abrirArchivo'">Abrir archivo .py</button>

        <div class="sidebar-espaciador"></div>

        <button class="btn-cerrar-sesion" id="btnCerrarSesion">Cerrar sesion</button>
    </aside>

    <main class="contenido">
        <!-- seccion cursos / tareas -->
        <section id="seccionCursos">
            <h2>Cursos</h2>
            <div class="lista-tareas" id="listaTareas">
                <p class="cargando" id="estadoCarga">Cargando tareas...</p>
            </div>
        </section>
    </main>

    <script>
        const BASE = 'http://170.9.26.131:80';

        // muestra el nombre del usuario guardado en sessionStorage
        const datosUsuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        if (datosUsuario.nombre) {
            document.getElementById('nombreUsuario').textContent = datosUsuario.nombre;
        }

        // redirige al login si no hay sesion
        if (!datosUsuario.idUsuario) {
            window.location.href = BASE + '/login';
        }

        function mostrarSeccion(seccion) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('activo'));
            if (seccion === 'cursos') {
                document.getElementById('btnCursos').classList.add('activo');
                document.getElementById('seccionCursos').style.display = 'block';
                cargarTareas();
            } else if (seccion === 'crearTarea') {
                document.getElementById('btnCrearTarea').classList.add('activo');
                window.location.href = BASE + '/crearTarea';
            }
        }

        function renderTareas(tareas) {
            const lista = document.getElementById('listaTareas');
            lista.innerHTML = '';

            if (!tareas || tareas.length === 0) {
                lista.innerHTML = '<p class="sin-tareas">No hay tareas creadas.</p>';
                return;
            }

            tareas.forEach(tarea => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-tarea';

                const nombre = document.createElement('span');
                nombre.textContent = tarea.nombre;

                const btn = document.createElement('button');
                btn.className = 'btn-ver';
                btn.textContent = 'Ver';
                btn.onclick = () => {
                    window.location.href = BASE + '/entregas?idTarea=' + tarea.idTarea;
                };

                tarjeta.appendChild(nombre);
                tarjeta.appendChild(btn);
                lista.appendChild(tarjeta);
            });
        }

        async function cargarTareas() {
            const lista = document.getElementById('listaTareas');
            lista.innerHTML = '<p class="cargando">Cargando tareas...</p>';

            try {
                const response = await fetch(BASE + '/api/tareas', {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    lista.innerHTML = '<p class="sin-tareas">Error al cargar las tareas.</p>';
                    return;
                }

                const data = await response.json();
                renderTareas(data.tareas || data);

            } catch (error) {
                lista.innerHTML = '<p class="sin-tareas">Error de conexion.</p>';
            }
        }

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            sessionStorage.removeItem('usuario');
            window.location.href = BASE + '/login';
        });

        // carga inicial
        cargarTareas();
    </script>
</body>
</html>
