<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--link rel="stylesheet" href="css/style.css"-->
    <title>Inicio de sesión</title>
</head>
<body>

    <h1>Inicio de sesión</h1>
    
    <label for="correo">Correo:</label>
    <input type="text" id="inputCorreo" name="correo">
    <br>

    <label for="Contraseña">Contraseña:</label>
    <input type="password" id="inputContrasena" name="contrasena">
    <br>

    <button type="button" id="buttonIniciarSesion">Iniciar sesión</button>
 
    <script>
        const buttonIniciarSesion = document.getElementById('buttonIniciarSesion');

        buttonIniciarSesion.addEventListener('click', async () => {
            const correo = document.getElementById('inputCorreo').value.trim();
            const contrasena = document.getElementById('inputContrasena').value.trim();
            const contrasenaEncriptada = password_hash($contrasena, PASSWORD_DEFAULT);

            if (!correo || !contrasena) {
                alert('Por favor, complete todos los campos.');
                return;
            }

            try {
                const response = await fetch('http://170.9.26.131:80/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo, contrasena })
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('Respuesta del servidor:', data);
                alert('Inicio de sesión exitoso.');

            } catch (error) {
                console.error('Error al iniciar sesión:', error);
                alert('Ocurrió un error al iniciar sesión. Intente de nuevo.');
            }
        });
    </script>
</body>
</html>
